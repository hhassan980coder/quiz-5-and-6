name: CI Pipeline

# Trigger the workflow on push or pull request to the main/master branch
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository code so the pipeline can access it
    - name: Checkout repository
      uses: actions/checkout@v4

    # Step 2: A simple sanity check (Lists files to ensure everything uploaded correctly)
    - name: Verify uploaded files
      run: |
        echo "Listing files in the repository:"
        ls -la

